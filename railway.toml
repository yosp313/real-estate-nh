# railway.toml — Al-Nader Real Estate (Laravel + Inertia + React)
# Deploy with: railway up

[build]
  builder = "dockerfile"
  dockerfilePath = "Dockerfile"

[deploy]
  startCommand = "/entrypoint.sh /usr/bin/supervisord -c /etc/supervisord.conf"
  healthcheckPath = "/up"
  healthcheckTimeout = 30
  restartPolicyType = "on_failure"
  restartPolicyMaxRetries = 3

[environments.production.deploy]
  region = "europe-west4"
