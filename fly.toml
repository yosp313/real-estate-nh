# fly.toml — Al-Nader Real Estate (Laravel + Inertia + React)
# Deploy with: fly deploy
# First-time setup: fly launch --no-deploy, then fly deploy

app = "al-nader-realestate"
primary_region = "iad"

[build]

[deploy]
  release_command = "php artisan migrate --force --no-interaction"

[env]
  APP_ENV = "production"
  APP_DEBUG = "false"
  APP_TIMEZONE = "UTC"
  APP_LOCALE = "en"
  APP_FALLBACK_LOCALE = "en"
  LOG_CHANNEL = "stderr"
  LOG_LEVEL = "error"
  DB_CONNECTION = "sqlite"
  DB_DATABASE = "/var/www/html/database/database.sqlite"
  SESSION_DRIVER = "file"
  CACHE_STORE = "file"
  QUEUE_CONNECTION = "sync"
  FILESYSTEM_DISK = "local"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1

[[mounts]]
  source = "sqlite_data"
  destination = "/var/www/html/database"
  initial_size = "1gb"
  snapshot_retention = 5

[[statics]]
  guest_path = "/var/www/html/public/build"
  url_prefix = "/build"

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/up"
    port = 80
    timeout = "10s"
    type = "http"
