# =============================================================================
# Docker Compose for EC2 Production Deployment
# =============================================================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.ec2.yml up -d
# =============================================================================

services:
  app:
    ports:
      - "0.0.0.0:80:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=${APP_URL:-http://localhost}
      - LOG_CHANNEL=stderr
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
